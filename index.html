<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPS Tax App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d1117; --surface:#161c26; --surfaceL:#1d2535;
    --border:#242e42; --borderL:#2d3a4f;
    --blue:#2563eb; --blueL:#3b82f6; --teal:#0d9488;
    --green:#10b981; --greenL:#34d399; --amber:#f59e0b;
    --red:#ef4444; --purple:#a855f7;
    --text:#f0f4f8; --textM:#94a3b8; --textD:#64748b;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
  *{scrollbar-width:thin;scrollbar-color:#2d3a4f #161c26;}
  ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:#161c26;}::-webkit-scrollbar-thumb{background:#2d3a4f;border-radius:3px;}
  #app{display:flex;height:100vh;}
  #sidebar{width:232px;min-width:232px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
  #main{flex:1;overflow-y:auto;}
  .logo-area{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
  .logo-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);line-height:1.1;}
  .logo-sub{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-top:2px;}
  .logo-year{font-size:11px;color:var(--textD);margin-top:4px;}
  .nav-area{padding:10px 8px;flex:1;overflow-y:auto;}
  .nav-section{font-size:10px;font-weight:700;color:var(--textD);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 3px;}
  .nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;background:none;border:1px solid transparent;border-radius:10px;cursor:pointer;font-size:13px;color:var(--textM);text-align:left;margin-bottom:2px;transition:all .15s;font-family:'DM Sans',sans-serif;}
  .nav-btn:hover:not(.active){background:var(--surfaceL);color:var(--text);}
  .nav-btn.active{background:rgba(37,99,235,.18);border-color:rgba(37,99,235,.35);color:var(--blueL);font-weight:600;}
  .cpa-box{margin:0 8px 12px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:12px 14px;}
  .cpa-label{font-size:10px;font-weight:700;color:var(--green);letter-spacing:.04em;margin-bottom:3px;}
  .cpa-text{font-size:11px;color:var(--textM);line-height:1.5;margin-bottom:8px;}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn:hover{filter:brightness(1.15);}
  .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn-green{background:var(--green);border-color:var(--green);color:#fff;}
  .btn-amber{background:var(--amber);border-color:var(--amber);color:#000;}
  .btn-danger{color:var(--red);border-color:rgba(239,68,68,.3);}
  .btn-sm{padding:6px 14px;font-size:12px;border-radius:8px;}
  .btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .lbl{font-size:11px;font-weight:700;color:var(--textM);letter-spacing:.06em;text-transform:uppercase;}
  .lbl .req{color:var(--red);}
  .inp{background:var(--surfaceL);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .15s;}
  .inp:focus{border-color:var(--blue);}
  .inp::placeholder{color:var(--textD);}
  select.inp option{background:var(--surfaceL);}
  textarea.inp{resize:vertical;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;}
  .stat-card{background:var(--surfaceL);border-radius:10px;padding:14px 16px;}
  .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
  .badge-blue{background:rgba(37,99,235,.15);color:var(--blueL);border:1px solid rgba(37,99,235,.3);}
  .badge-teal{background:rgba(13,148,136,.15);color:#2dd4bf;border:1px solid rgba(13,148,136,.3);}
  .badge-green{background:rgba(16,185,129,.15);color:var(--greenL);border:1px solid rgba(16,185,129,.3);}
  .badge-amber{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
  .badge-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
  .prog-track{background:var(--surfaceL);border-radius:6px;height:7px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:6px;transition:width .8s ease;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--textD);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);}
  .tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(36,46,66,.5);vertical-align:middle;}
  .tbl tr:hover td{background:var(--surfaceL);}
  .tbl tr:last-child td{border-bottom:none;}
  #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;}
  #modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--borderL);border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.7);}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);}
  .modal-head h3{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);}
  .modal-close{background:none;border:none;color:var(--textM);font-size:20px;cursor:pointer;padding:2px 6px;}
  .modal-body{padding:22px;display:flex;flex-direction:column;gap:16px;}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding-top:4px;}
  #toast{position:fixed;top:20px;right:20px;z-index:2000;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:500;display:none;animation:toastIn .25s ease;max-width:320px;}
  .toast-ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);color:var(--greenL);}
  .toast-err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:var(--red);}
  .toast-info{background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.4);color:var(--blueL);}
  @keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .page{padding:28px 30px;}
  .page-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:4px;}
  .page-sub{font-size:13px;color:var(--textM);margin-bottom:22px;}
  .timer-box{font-family:'Courier New',monospace;font-size:38px;font-weight:700;color:var(--textD);background:var(--surfaceL);border:1px solid var(--border);border-radius:12px;padding:10px 22px;min-width:170px;text-align:center;letter-spacing:2px;transition:all .3s;}
  .timer-box.running{color:var(--green);border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.07);}
  .check-row{display:flex;align-items:flex-start;gap:10px;background:var(--surfaceL);border-radius:10px;padding:12px 14px;}
  .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px;}
  .check-row label{font-size:13px;color:var(--textM);cursor:pointer;line-height:1.4;}
  .callout{border-radius:10px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;}
  .callout-amber{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);}
  .callout-blue{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.25);}
  .callout-green{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);}
  .callout-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
  .callout-title{font-size:12px;font-weight:700;margin-bottom:3px;}
  .callout-body{font-size:12px;color:var(--textM);line-height:1.55;}
  .callout-amber .callout-title{color:var(--amber);}
  .callout-blue .callout-title{color:var(--blueL);}
  .callout-green .callout-title{color:var(--greenL);}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
  .irc-ref{font-size:10px;color:var(--textD);font-style:italic;}
  .test-card{background:var(--surfaceL);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;}
  .test-met{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05);}
  .test-close{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04);}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo-area">
      <div class="logo-title">REPS</div>
      <div class="logo-sub">Tax App</div>
      <div class="logo-year" id="tax-year"></div>
    </div>
    <nav class="nav-area">
      <div class="nav-section">Overview</div>
      <button class="nav-btn active" data-page="dashboard" onclick="nav('dashboard')"><span style="width:18px;text-align:center;">◈</span> Dashboard</button>
      <div class="nav-section">Tracking</div>
      <button class="nav-btn" data-page="log" onclick="nav('log')"><span style="width:18px;text-align:center;">⊕</span> Log Hours</button>
      <button class="nav-btn" data-page="mileage" onclick="nav('mileage')"><span style="width:18px;text-align:center;">⬡</span> Mileage Log</button>
      <button class="nav-btn" data-page="entries" onclick="nav('entries')"><span style="width:18px;text-align:center;">≡</span> Time Entries</button>
      <div class="nav-section">Setup</div>
      <button class="nav-btn" data-page="properties" onclick="nav('properties')"><span style="width:18px;text-align:center;">⌂</span> Properties</button>
      <button class="nav-btn" data-page="participants" onclick="nav('participants')"><span style="width:18px;text-align:center;">◉</span> Participants</button>
      <div class="nav-section">Compliance</div>
      <button class="nav-btn" data-page="tests" onclick="nav('tests')"><span style="width:18px;text-align:center;">✓</span> Material Participation</button>
      <button class="nav-btn" data-page="audit" onclick="nav('audit')"><span style="width:18px;text-align:center;">⚖</span> Audit Defense</button>
    </nav>
    <div class="cpa-box">
      <div class="cpa-label">§469(c)(7) STATUS</div>
      <div class="cpa-text"><span id="sb-hrs">0.0</span> / 750 hrs &nbsp;·&nbsp; <span id="sb-pct">0%</span> of profession</div>
      <button class="btn btn-green btn-sm" onclick="showToast('CPA scheduling available in full version','info')" style="width:100%;justify-content:center;font-size:11px;">Schedule CPA Review</button>
    </div>
  </div>
  <div id="main"></div>
</div>
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
const YEAR = new Date().getFullYear();
const MILEAGE_RATE = 0.70;

const ACTIVITY_TYPES = [
  'Development','Redevelopment','Construction','Reconstruction',
  'Acquisition','Conversion','Rental Operations','Management',
  'Leasing','Brokerage','Maintenance & Repairs','Tenant Communication',
  'Marketing & Advertising','Bookkeeping & Admin','Property Inspections',
  'Lease Negotiations','Legal & Compliance','Education & Research','Travel to Property'
];

const MP_TESTS = [
  {num:1,name:'500+ Hours',desc:'Participated more than 500 hours during the year',threshold:500,irc:'Reg §1.469-5T(a)(1)'},
  {num:2,name:'Substantially All',desc:'Your participation constitutes substantially all participation in the activity (no one else participates)',threshold:null,irc:'Reg §1.469-5T(a)(2)'},
  {num:3,name:'100 Hrs & Most',desc:'100+ hours and no other individual participates more than you',threshold:100,irc:'Reg §1.469-5T(a)(3)'},
  {num:4,name:'Significant Participation',desc:'100+ hours in this activity and 500+ aggregate hours across all significant participation activities',threshold:100,irc:'Reg §1.469-5T(a)(4)'},
  {num:5,name:'5 of Prior 10 Years',desc:'Materially participated in 5 of the prior 10 taxable years (any 5, not necessarily consecutive)',threshold:null,irc:'Reg §1.469-5T(a)(5)'},
  {num:6,name:'Personal Service — 3 Prior Years',desc:'Personal service activity in which you materially participated in any 3 prior taxable years',threshold:null,irc:'Reg §1.469-5T(a)(6)'},
  {num:7,name:'Facts & Circumstances',desc:'Regular, continuous, and substantial basis — minimum 100 hours required. Management alone does not count if anyone else manages for compensation.',threshold:100,irc:'Reg §1.469-5T(a)(7)'},
];

const AVATAR_COLORS=[
  {bg:'rgba(37,99,235,.18)',border:'rgba(37,99,235,.4)',text:'#60a5fa'},
  {bg:'rgba(13,148,136,.18)',border:'rgba(13,148,136,.4)',text:'#2dd4bf'},
  {bg:'rgba(245,158,11,.18)',border:'rgba(245,158,11,.4)',text:'#fbbf24'},
  {bg:'rgba(168,85,247,.18)',border:'rgba(168,85,247,.4)',text:'#c084fc'},
];

let S = {
  page:'dashboard', nextId:100,
  timer:{running:false,seconds:0,propId:'',actType:'',interval:null},
  aggregationElection:false, aggregationElectionYear:null,
  totalProfessionHours:0,
  properties:[], participants:[], entries:[], mileage:[],
};

const fmt   = n => parseFloat(n||0).toFixed(1);
const fmtC  = n => '$'+(parseFloat(n||0).toFixed(2));
const pct   = (a,b) => b>0?Math.min(100,Math.round(a/b*100)):0;
const ini   = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const prop  = id => S.properties.find(p=>p.id===id);
const part  = id => S.participants.find(p=>p.id===id);
const typeColor = t => t==='STR'?'teal':'blue';
const nowTS = () => new Date().toISOString();
const fmtTimer = s => [Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(n=>String(n).padStart(2,'0')).join(':');

function repsHours(){
  const pr=S.participants.find(p=>p.main);
  if(!pr) return 0;
  return S.entries.filter(e=>e.partId===pr.id).reduce((s,e)=>s+e.duration,0);
}
function hoursForProp(propId,partId){
  return S.entries.filter(e=>e.propId===propId&&(!partId||e.partId===partId)).reduce((s,e)=>s+e.duration,0);
}
function professionPct(){
  const reH=repsHours(), tot=S.totalProfessionHours+reH;
  return tot===0?0:Math.round(reH/tot*100);
}
function mpTestsForProp(propId){
  const pr=S.participants.find(p=>p.main); if(!pr) return [];
  const myH=hoursForProp(propId,pr.id);
  const maxO=Math.max(0,...S.participants.filter(p=>!p.main).map(p=>hoursForProp(propId,p.id)));
  const met=[];
  if(myH>500) met.push(1);
  if(myH>0&&maxO===0) met.push(2);
  if(myH>=100&&myH>maxO) met.push(3);
  if(myH>=100) met.push(4,7);
  return met;
}

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast-'+type; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2800);
}
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function progBar(v,m,c){return `<div class="prog-track"><div class="prog-fill" style="width:${pct(v,m)}%;background:${c};"></div></div>`;}

function updateSidebar(){
  const h=repsHours(),p=professionPct();
  const e1=document.getElementById('sb-hrs'),e2=document.getElementById('sb-pct');
  if(e1)e1.textContent=fmt(h); if(e2)e2.textContent=p+'%';
}

function nav(page){
  S.page=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  render();
}
function render(){
  document.getElementById('main').scrollTop=0;
  ({dashboard:renderDashboard,log:renderLog,mileage:renderMileage,entries:renderEntries,properties:renderProperties,participants:renderParticipants,tests:renderTests,audit:renderAudit}[S.page]||renderDashboard)();
  updateSidebar();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  const rH=repsHours(),rR=750;
  const sH=S.properties.filter(p=>p.type==='STR').reduce((s,p)=>s+hoursForProp(p.id),0),sR=500;
  const pp=professionPct();
  const totMi=S.mileage.reduce((s,m)=>s+m.miles,0);
  const mLabels=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mH=Array.from({length:12},(_,i)=>S.entries.filter(e=>new Date(e.date).getMonth()===i).reduce((s,e)=>s+e.duration,0));
  const maxM=Math.max(...mH,1); const curM=new Date().getMonth();
  const catT={};S.entries.forEach(e=>{catT[e.actType]=(catT[e.actType]||0)+e.duration;});
  const catC={'Rental Operations':'var(--blue)','Management':'var(--teal)','Bookkeeping & Admin':'var(--amber)','Maintenance & Repairs':'var(--green)','Property Inspections':'var(--purple)','Travel to Property':'#f97316'};
  const cats=Object.entries(catT).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,h])=>({n,h,c:catC[n]||'var(--blueL)'}));
  const isEmpty=S.properties.length===0&&S.participants.length===0;
  const ring=(v,m,color,sz=100)=>{
    const r=(sz-12)/2,ci=2*Math.PI*r,p2=Math.min(1,v/m),off=ci*(1-p2);
    return `<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--surfaceL)" stroke-width="8"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${ci}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s ease"/></svg>`;
  };

  document.getElementById('main').innerHTML=`<div class="page">
    <div style="margin-bottom:20px;"><div class="page-title">Welcome to REPS Tax App.</div>
    <div style="font-size:13px;color:var(--textM);">IRC §469(c)(7) qualification status for tax year ${YEAR}.</div></div>

    ${isEmpty?`<div style="text-align:center;padding:46px 20px;border:1px dashed var(--border);border-radius:14px;margin-bottom:22px;">
      <div style="font-size:34px;margin-bottom:12px;">🏠</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">Let's get you set up</div>
      <div style="font-size:13px;color:var(--textM);margin-bottom:6px;line-height:1.7;">Add yourself as a participant, then add your rental properties.</div>
      <div style="font-size:12px;color:var(--textD);margin-bottom:20px;">Tracks all 7 IRC §1.469-5T material participation tests + §469(c)(7) 750-hr and >50% profession tests.</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="nav('participants')">◉ Add Yourself First</button>
        <button class="btn" onclick="nav('properties')">⌂ Add a Property</button>
        <button class="btn btn-green" onclick="nav('log')">⊕ Log Your First Hours</button>
      </div></div>`:''}

    <div class="g4" style="margin-bottom:18px;">
      ${[
        {label:'REPS Hours',val:fmt(rH),sub:'§469(c)(7)(B) · need 750',color:'var(--blue)',icon:'⏱'},
        {label:'Profession %',val:pp+'%',sub:'§469(c)(7)(A) · need >50%',color:pp>50?'var(--green)':'var(--amber)',icon:'◎'},
        {label:'Active Properties',val:S.properties.filter(p=>p.active).length,sub:S.properties.filter(p=>p.active&&p.type==='LTR').length+' LTR · '+S.properties.filter(p=>p.active&&p.type==='STR').length+' STR',color:'var(--teal)',icon:'⌂'},
        {label:'Mileage Value',val:fmtC(totMi*MILEAGE_RATE),sub:Math.round(totMi)+' mi × $'+MILEAGE_RATE+'/mi §274(d)',color:'var(--amber)',icon:'⬡'},
      ].map(c=>`<div class="card" style="border-top:3px solid ${c.color};padding:16px 18px;">
        <div style="font-size:18px;margin-bottom:6px;">${c.icon}</div>
        <div style="font-size:26px;font-weight:700;color:var(--text);line-height:1;">${c.val}</div>
        <div style="font-size:11px;color:var(--textM);margin-top:4px;">${c.label}</div>
        <div style="font-size:10px;color:var(--textD);margin-top:2px;">${c.sub}</div>
      </div>`).join('')}
    </div>

    <div class="g2" style="margin-bottom:18px;">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="flex:1;padding-right:14px;">
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;">§469(c)(7)(B) — 750-Hour Test</div>
            <div class="irc-ref" style="margin-bottom:10px;">Must materially participate in real property trades or businesses</div>
            ${progBar(rH,rR,'var(--blue)')}

function toggleTimer(){
  if(!S.timer.running){
    S.timer.propId=document.getElementById('t-prop').value;
    S.timer.actType=document.getElementById('t-act').value;
    S.timer.running=true;
    S.timer.interval=setInterval(()=>{
      S.timer.seconds++;
      const d=document.getElementById('timer-disp');
      if(d){d.textContent=fmtTimer(S.timer.seconds);d.classList.add('running');}
    },1000);
    const b=document.getElementById('timer-btn');
    b.innerHTML='■ Stop &amp; Log';b.className='btn btn-danger';
    b.insertAdjacentHTML('afterend','<span id="rec-dot" style="font-size:12px;color:var(--green);margin-left:10px;">● Recording</span>');
  } else {
    clearInterval(S.timer.interval);
    const hrs=Math.max(0.25,Math.round((S.timer.seconds/3600)*4)/4);
    S.timer.running=false;S.timer.seconds=0;
    const d=document.getElementById('timer-disp');
    if(d){d.textContent='00:00:00';d.classList.remove('running');}
    const b=document.getElementById('timer-btn');
    if(b){b.innerHTML='▶ Start Timer';b.className='btn btn-green';}
    const dot=document.getElementById('rec-dot');if(dot)dot.remove();
    const fp=document.getElementById('f-prop'),fa=document.getElementById('f-act'),fd=document.getElementById('f-dur');
    if(fp)fp.value=S.timer.propId; if(fa)fa.value=S.timer.actType; if(fd)fd.value=hrs.toFixed(2);
    showToast('Timer stopped — entry pre-filled below','info');
  }
}

function clearLog(){
  const today=new Date().toISOString().split('T')[0];
  ['f-dur','f-act','f-desc','f-prop','f-part','f-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const fd=document.getElementById('f-date');if(fd)fd.value=today;
}

function submitEntry(){
  const date=document.getElementById('f-date').value;

  S.entries.unshift({id:S.nextId++,date,duration:parseFloat(dur),actType,description:desc,propId:parseInt(propId),partId:parseInt(partId),notes,createdAt:nowTS()});
  clearLog();showToast('Entry logged ✓ — timestamp recorded','ok');updateSidebar();
}

function savePart(id){
  const name=document.getElementById('m-name').value.trim();
  if(!name){showToast('Name is required','err');return;}
  if(!id){
    const isMain=document.getElementById('m-main').checked,isSpouse=document.getElementById('m-spouse').checked;
    if(isMain&&S.participants.some(p=>p.main)){showToast('Only one primary filer allowed — §469(c)(7)(C)','err');return;}
    S.participants.push({id:S.nextId++,name,role:document.getElementById('m-role').value,main:isMain,spouse:isSpouse,notes:document.getElementById('m-notes').value,active:true});
  } else {
    S.participants=S.participants.map(p=>p.id===id?{...p,name,role:document.getElementById('m-role').value,notes:document.getElementById('m-notes').value}:p);
  }
  closeModal();showToast(id?'Updated ✓':'Participant added ✓','ok');renderParticipants();
}
function removePart(id){S.participants=S.participants.filter(p=>p.id!==id);showToast('Removed','info');renderParticipants();}

// ── MATERIAL PARTICIPATION TESTS ─────────────────────────────────────────────
function renderTests(){
  const pr=S.participants.find(p=>p.main);
  const prH=pr?S.entries.filter(e=>e.partId===pr.id).reduce((s,e)=>s+e.duration,0):0;
  const maxO=Math.max(0,...S.participants.filter(p=>!p.main).map(p=>S.entries.filter(e=>e.partId===p.id).reduce((s,e)=>s+e.duration,0)));
  const allSPA=S.properties.reduce((s,p)=>{const h=hoursForProp(p.id,pr?.id);return s+(h>=100?h:0);},0);

  const testMet=n=>{
    switch(n){
      case 1:return prH>500;
      case 2:return prH>0&&maxO===0;
      case 3:return prH>=100&&prH>maxO;
      case 4:return prH>=100&&allSPA>500;
      case 5:case 6:return false;
      case 7:return prH>=100;
      default:return false;
    }
  };

  document.getElementById('main').innerHTML=`<div class="page">
    <div class="page-title">Material Participation Tests</div>
    <div class="page-sub">Reg §1.469-5T — Must satisfy at least ONE test to treat rental losses as nonpassive. Primary filer: <strong style="color:var(--text);">${pr?pr.name:'No primary filer set'}</strong> · ${fmt(prH)} hrs logged</div>
    <div class="callout callout-blue" style="margin-bottom:20px;">
      <span class="callout-icon">ℹ</span>
      <div><div class="callout-title">How these tests work</div>
      <div class="callout-body">These 7 tests determine material participation per Reg §1.469-5T. For REPS qualification under §469(c)(7), you must <em>also</em> separately meet the 750-hour test and >50% profession test. Meeting these material participation tests means your rental losses are treated as nonpassive — deductible against ordinary income.</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">
      ${MP_TESTS.map(t=>{
        const met=testMet(t.num);
        const close=!met&&t.threshold&&prH>=(t.threshold*0.6);
        return `<div class="test-card ${met?'test-met':close?'test-close':''}">
          <div style="display:flex;align-items:flex-start;gap:14px;">
            <div style="width:30px;height:30px;border-radius:50%;background:${met?'rgba(16,185,129,.2)':'var(--border)'};border:1.5px solid ${met?'var(--green)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${met?'var(--green)':'var(--textD)'};flex-shrink:0;margin-top:1px;">${t.num}</div>
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                <div style="font-size:13px;font-weight:600;color:var(--text);">${t.name}</div>
                ${met?'<span class="badge badge-green" style="font-size:9px;">✓ Met</span>':close?`<span class="badge badge-amber" style="font-size:9px;">Close</span>`:`<span class="badge" style="font-size:9px;background:var(--surfaceL);color:var(--textD);">Not Met</span>`}
              </div>
              <div style="font-size:12px;color:var(--textM);margin-bottom:4px;">${t.desc}</div>
              <div class="irc-ref">${t.irc}</div>
              ${t.num===1?`<div style="margin-top:8px;">${progBar(prH,500,'var(--green)')}<div style="font-size:10px;color:var(--textD);margin-top:3px;">${fmt(prH)} / 500 hours</div></div>`:''}
              ${t.num===3?`<div style="font-size:11px;color:var(--textM);margin-top:6px;">Your hours: <strong style="color:var(--text);">${fmt(prH)}</strong> · Next highest participant: <strong style="color:var(--text);">${fmt(maxO)}</strong> · ${prH>maxO?'<span style="color:var(--green);">✓ You lead</span>':`<span style="color:var(--amber);">Need more than ${fmt(maxO)}</span>`}</div>`:''}
              ${t.num===5||t.num===6?`<div class="callout callout-amber" style="margin-top:8px;padding:8px 12px;"><span class="callout-icon" style="font-size:12px;">⚠</span><div class="callout-body" style="font-size:11px;">Requires prior-year data — confirm with your CPA based on your filing history.</div></div>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">§469(c)(7) REPS Tests — In Addition to Material Participation</div>
      <div style="font-size:11px;color:var(--textM);margin-bottom:14px;">Both of these tests must be met to qualify as a Real Estate Professional:</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="test-card ${repsHours()>=750?'test-met':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;">§469(c)(7)(B) — 750-Hour Test</div>
            <div style="font-size:11px;color:var(--textM);">More than 750 hours in real property trades or businesses with material participation</div>
            <div class="irc-ref">IRC §469(c)(7)(B) · Bailey v. Comm'r — hard floor, no approximation</div></div>
            <div style="text-align:center;min-width:80px;"><div style="font-size:20px;font-weight:700;color:${repsHours()>=750?'var(--green)':'var(--text)'};">${fmt(repsHours())}</div><div style="font-size:9px;color:var(--textD);">/ 750 hrs</div></div>
          </div>
        </div>
        <div class="test-card ${professionPct()>50?'test-met':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;">§469(c)(7)(A) — >50% Profession Test</div>
            <div style="font-size:11px;color:var(--textM);">More than half of personal services in all trades/businesses must be in real property</div>
            <div class="irc-ref">IRC §469(c)(7)(A) · Enter other-profession hours on Participants page</div></div>
            <div style="text-align:center;min-width:80px;"><div style="font-size:20px;font-weight:700;color:${professionPct()>50?'var(--green)':'var(--amber)'};">${professionPct()}%</div><div style="font-size:9px;color:var(--textD);">need >50%</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── AUDIT DEFENSE ────────────────────────────────────────────────────────────
function renderAudit(){
  const totH=S.entries.reduce((s,e)=>s+e.duration,0),totMi=S.mileage.reduce((s,m)=>s+m.miles,0);
  const rH=repsHours(),pp=professionPct();
  const q750=rH>=750,qPct=pp>50,qFull=q750&&qPct;
  const checks=[
    {ok:S.participants.some(p=>p.main),label:'Primary filer designated',detail:'Required for §469(c)(7) tracking',irc:'§469(c)(7)(C)'},
    {ok:S.properties.filter(p=>p.active).length>0,label:'Active properties added',detail:'All rental interests must be documented',irc:'§469(c)(7)(B)'},
    {ok:S.entries.length>0,label:'Time entries logged',detail:'Contemporaneous records required',irc:'Reg §1.469-5T(f)(4)'},
    {ok:S.entries.length>0&&S.entries.every(e=>e.createdAt),label:'All entries have creation timestamps',detail:'Proves contemporaneous logging — Moss v. Comm\'r, Birdsong v. Comm\'r',irc:'T.C. Memo 2012-97 / 2018-148'},
    {ok:S.entries.length>0&&S.entries.every(e=>e.description&&e.description.length>10),label:'Detailed activity descriptions (10+ chars)',detail:'Vague descriptions rejected at audit — Birdsong v. Comm\'r',irc:'T.C. Memo 2018-148'},
    {ok:q750,label:`750-hour test met (${fmt(rH)} hrs)`,detail:'Hard floor — Bailey v. Comm\'r, no approximation accepted',irc:'§469(c)(7)(B)'},
    {ok:qPct,label:`>50% profession test met (${pp}%)`,detail:'Enter other-profession hours on Participants page',irc:'§469(c)(7)(A)'},
    {ok:S.aggregationElection,label:'§1.469-9(e)(1) aggregation election recorded',detail:'Must be on timely filed return — Harnett v. Comm\'r',irc:'Reg §1.469-9(e)(1)'},
    {ok:S.mileage.length>0,label:'Mileage log maintained',detail:'§274(d) substantiation for travel deductions. Travel counts toward REPS hours — Tobin v. Comm\'r',irc:'§274(d) / T.C. Memo 2013-83'},
  ];
  const passed=checks.filter(c=>c.ok).length,score=Math.round(passed/checks.length*100);

  document.getElementById('main').innerHTML=`<div class="page">
    <div class="page-title">Audit Defense</div>
    <div class="page-sub">IRS documentation checklist — §469(c)(7), Reg §1.469-5T(f)(4), and Tax Court case law</div>
    <div class="g2" style="margin-bottom:18px;">
      <div class="card" style="border-top:3px solid ${qFull?'var(--green)':'var(--amber)'};">
        <div style="font-size:12px;color:var(--textM);margin-bottom:6px;">§469(c)(7) Qualification Status</div>
        <div style="font-size:22px;font-weight:700;color:${qFull?'var(--green)':'var(--amber)'};">${qFull?'✓ Qualifies':'In Progress'}</div>
        <div style="font-size:11px;color:var(--textM);margin-top:6px;">750-hr: ${q750?'✓':'⚠ '+fmt(rH)+'/750'} &nbsp;·&nbsp; >50%: ${qPct?'✓':'⚠ '+pp+'%'}</div>
      </div>
      <div class="card" style="border-top:3px solid ${score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)'};">
        <div style="font-size:12px;color:var(--textM);margin-bottom:6px;">Audit Readiness Score</div>
        <div style="font-size:22px;font-weight:700;color:${score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)'};">${score}%</div>
        <div style="margin-top:8px;">${progBar(score,100,score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)')}</div>
        <div style="font-size:11px;color:var(--textM);margin-top:5px;">${passed}/${checks.length} checks passed</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:18px;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;">Documentation Checklist</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${checks.map(c=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:${c.ok?'rgba(16,185,129,.05)':'rgba(245,158,11,.05)'};border:1px solid ${c.ok?'rgba(16,185,129,.2)':'rgba(245,158,11,.2)'};border-radius:8px;">
          <span style="font-size:15px;flex-shrink:0;margin-top:1px;">${c.ok?'✅':'⚠️'}</span>
          <div style="flex:1;"><div style="font-size:13px;font-weight:500;color:var(--text);">${c.label}</div>
          <div style="font-size:11px;color:var(--textM);margin-top:2px;">${c.detail}</div>
          <div class="irc-ref" style="margin-top:2px;">${c.irc}</div></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card" style="margin-bottom:18px;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;">Controlling Case Law</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${[
          {c:'Moss v. Comm\'r (T.C. Memo 2012-97)',h:'Reconstructed logs rejected — must be created contemporaneously'},
          {c:'Birdsong v. Comm\'r (T.C. Memo 2018-148)',h:'Vague descriptions rejected — activities must be specifically described'},
          {c:'Tobin v. Comm\'r (T.C. Memo 2013-83)',h:'Travel time to/from properties counts toward REPS hours'},
          {c:'Bailey v. Comm\'r (T.C. Memo 2001-296)',h:'750 hours is a hard floor — approximations and estimates rejected'},
          {c:'Gragg v. U.S. (Fed. Cl. 2011)',h:'Detailed daily logs were viewed favorably — gold standard'},
          {c:'Harnett v. Comm\'r (T.C. Memo 2020-61)',h:'Aggregation election must appear on timely filed return'},
          {c:'Aragona v. Comm\'r (T.C. Memo 2019-63)',h:'Digital spreadsheets with specificity accepted as valid evidence'},
        ].map(x=>`<div style="padding:8px 12px;background:var(--surfaceL);border-radius:7px;border-left:3px solid var(--blue);">
          <div style="font-size:11px;font-weight:600;color:var(--blueL);">${x.c}</div>
          <div style="font-size:11px;color:var(--textM);margin-top:2px;">${x.h}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="exportCSV()" style="flex:1;justify-content:center;">↓ Export IRS Audit Log (CSV)</button>
      <button class="btn btn-green" onclick="showToast('PDF audit package available in full version','info')" style="flex:1;justify-content:center;">↓ Export Audit Package (PDF)</button>
    </div>
  </div>`;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
document.getElementById('tax-year').textContent=YEAR+' Tax Year';
render();
</script>
</body>
</html>
